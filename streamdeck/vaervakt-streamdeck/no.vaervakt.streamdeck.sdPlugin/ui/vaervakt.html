<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Værvakt</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111c33;
      --line: rgba(148, 163, 184, .26);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    h1 {
      margin: 0 0 14px;
      color: #f8fafc;
      font-size: 16px;
      letter-spacing: .02em;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
      padding: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, .24);
      border-radius: 12px;
      background: rgba(2, 6, 23, .38);
      color: var(--text);
      padding: 10px 11px;
      font: inherit;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, .15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 2px 0 14px;
      color: var(--text);
      font-weight: 800;
    }

    .toggle input {
      width: auto;
      accent-color: var(--accent);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #7dd3fc, #38bdf8);
      color: #06111f;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      padding: 10px 12px;
    }

    button.secondary {
      border: 1px solid rgba(148, 163, 184, .24);
      background: rgba(15, 23, 42, .72);
      color: var(--text);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin: 0 0 12px;
    }

    .status {
      min-height: 18px;
      margin: -2px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .status[data-tone="ok"] {
      color: #86efac;
    }

    .status[data-tone="error"] {
      color: #fecdd3;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .section {
      margin: 16px 0 10px;
      color: #bae6fd;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>Værvakt-knapp</h1>
  <form class="card" id="settings-form">
    <div class="section">Sted</div>
    <label>
      Stedsnavn
      <input id="placeName" name="placeName" placeholder="Kristiansand">
    </label>

    <div class="row">
      <label>
        Latitude
        <input id="lat" name="lat" inputmode="decimal" placeholder="58.1467">
      </label>
      <label>
        Longitude
        <input id="lon" name="lon" inputmode="decimal" placeholder="7.9956">
      </label>
    </div>

    <div class="actions">
      <button type="button" class="secondary" id="usePosition">Bruk posisjon</button>
      <button type="button" class="secondary" id="findPlace">Finn sted fra navn</button>
      <div class="status" id="positionStatus"></div>
    </div>

    <label>
      Oppdater hvert X minutt
      <input id="refreshMinutes" name="refreshMinutes" type="number" min="2" max="60" step="1" placeholder="10">
    </label>

    <div class="section">Badetemperatur</div>
    <label>
      Badeplass for badetemp-knapp
      <select id="bathLocationId" name="bathLocationId">
        <option value="">Nærmeste automatisk</option>
      </select>
    </label>
    <div class="actions">
      <button type="button" class="secondary" id="loadBathPlaces">Hent badeplasser nær stedet</button>
      <div class="status" id="bathStatus"></div>
    </div>

    <div class="section">Hurtigrapport</div>
    <label>
      Rapportørnavn
      <input id="reporterName" name="reporterName" placeholder="Stream Deck">
    </label>

    <label>
      Værtype for Send rapport
      <select id="reportCondition" name="reportCondition">
        <option value="Sol / Klart">☀️ Sol / Klart</option>
        <option value="Delvis skyet">⛅ Delvis skyet</option>
        <option value="Skyet">☁️ Skyet</option>
        <option value="Regn">🌧️ Regn</option>
        <option value="Snø">❄️ Snø</option>
        <option value="Torden">⛈️ Torden</option>
      </select>
    </label>

    <div class="section">App</div>
    <label>
      API-base
      <input id="apiBase" name="apiBase" placeholder="https://www.værvakt.no">
    </label>

    <label class="toggle">
      Åpne Værvakt når knappen trykkes
      <input id="openOnPress" name="openOnPress" type="checkbox">
    </label>

    <button type="submit">Lagre</button>
    <p class="hint">Tips: Søk opp stedet i Værvakt, og bruk koordinatene derfra hvis du vil ha helt spesifikk knapp.</p>
  </form>

  <script>
    const defaults = {
      apiBase: "https://www.xn--vrvakt-pua.no",
      placeName: "Kristiansand",
      lat: 58.1467,
      lon: 7.9956,
      refreshMinutes: 5,
      bathLocationId: "",
      bathLocationName: "",
      openOnPress: true,
      reporterName: "Stream Deck",
      reportCondition: "Sol / Klart"
    };

    let websocket = null;
    let context = null;
    let settings = { ...defaults };

    const form = document.getElementById("settings-form");
    const positionStatus = document.getElementById("positionStatus");
    const bathStatus = document.getElementById("bathStatus");
    const usePositionButton = document.getElementById("usePosition");
    const findPlaceButton = document.getElementById("findPlace");
    const loadBathPlacesButton = document.getElementById("loadBathPlaces");
    const fields = {
      apiBase: document.getElementById("apiBase"),
      placeName: document.getElementById("placeName"),
      lat: document.getElementById("lat"),
      lon: document.getElementById("lon"),
      refreshMinutes: document.getElementById("refreshMinutes"),
      bathLocationId: document.getElementById("bathLocationId"),
      openOnPress: document.getElementById("openOnPress"),
      reporterName: document.getElementById("reporterName"),
      reportCondition: document.getElementById("reportCondition")
    };

    function setStatus(element, message, tone = "") {
      element.textContent = message;
      element.dataset.tone = tone;
    }

    function render() {
      fields.apiBase.value = settings.apiBase || defaults.apiBase;
      fields.placeName.value = settings.placeName || defaults.placeName;
      fields.lat.value = settings.lat ?? defaults.lat;
      fields.lon.value = settings.lon ?? defaults.lon;
      fields.refreshMinutes.value = settings.refreshMinutes || defaults.refreshMinutes;
      ensureBathOption(settings.bathLocationId || "", settings.bathLocationName || "");
      fields.bathLocationId.value = settings.bathLocationId || "";
      fields.openOnPress.checked = settings.openOnPress !== false;
      fields.reporterName.value = settings.reporterName || defaults.reporterName;
      fields.reportCondition.value = settings.reportCondition || defaults.reportCondition;
    }

    function readForm() {
      return {
        apiBase: fields.apiBase.value.trim() || defaults.apiBase,
        placeName: fields.placeName.value.trim() || defaults.placeName,
        lat: fields.lat.value.trim() || String(defaults.lat),
        lon: fields.lon.value.trim() || String(defaults.lon),
        refreshMinutes: fields.refreshMinutes.value || defaults.refreshMinutes,
        bathLocationId: fields.bathLocationId.value || "",
        bathLocationName: getSelectedBathName(),
        openOnPress: fields.openOnPress.checked,
        reporterName: fields.reporterName.value.trim() || defaults.reporterName,
        reportCondition: fields.reportCondition.value || defaults.reportCondition
      };
    }

    function saveSettings() {
      if (!websocket || !context) return;
      settings = readForm();
      websocket.send(JSON.stringify({
        event: "setSettings",
        context,
        payload: settings
      }));
    }

    function getSelectedBathName() {
      const selected = fields.bathLocationId.selectedOptions[0];
      return fields.bathLocationId.value ? selected?.dataset.name || selected?.textContent || "" : "";
    }

    function setSelectedBathOption(id) {
      fields.bathLocationId.value = id || "";
      const selectedName = getSelectedBathName();
      if (selectedName) {
        setStatus(bathStatus, `Valgt badeplass: ${selectedName}.`, "ok");
      }
    }

    function ensureBathOption(id, name) {
      if (!id || findBathOption(id)) {
        return;
      }

      const option = document.createElement("option");
      option.value = id;
      option.dataset.name = name || id;
      option.textContent = name || id;
      fields.bathLocationId.append(option);
    }

    function updateBathOptions(places) {
      const currentId = fields.bathLocationId.value || settings.bathLocationId || "";
      const currentName = getSelectedBathName() || settings.bathLocationName || "";
      fields.bathLocationId.innerHTML = "";

      const automatic = document.createElement("option");
      automatic.value = "";
      automatic.textContent = "Nærmeste automatisk";
      fields.bathLocationId.append(automatic);

      places.forEach((place) => {
        const locationId = place.locationId || place.id;
        if (!locationId || !place.name) return;
        const option = document.createElement("option");
        option.value = String(locationId);
        option.dataset.name = String(place.name);
        option.textContent = `${place.name} (${formatDistance(place.distanceKm)})`;
        fields.bathLocationId.append(option);
      });

      const matchedById = findBathOption(currentId);
      const matchedByName = currentName
        ? Array.from(fields.bathLocationId.options).find((option) => {
          return option.dataset.name?.toLowerCase() === currentName.toLowerCase();
        })
        : null;
      const nearest = fields.bathLocationId.options[1] || null;

      setSelectedBathOption((matchedById || matchedByName || nearest)?.value || "");
    }

    function findBathOption(id) {
      return Array.from(fields.bathLocationId.options).find((option) => option.value === id);
    }

    async function requestJson(url) {
      const response = await fetch(url, {
        headers: { Accept: "application/json" }
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return response.json();
    }

    async function loadBathPlaces(shouldSave = true) {
      const current = readForm();
      const params = new URLSearchParams({
        lat: current.lat,
        lon: current.lon
      });

      setStatus(bathStatus, "Henter badeplasser...");
      const payload = await requestJson(`${current.apiBase}/api/weather.php?${params.toString()}`);
      const places = Array.isArray(payload.bathing?.nearby) ? payload.bathing.nearby : [];
      updateBathOptions(places);
      if (shouldSave) {
        saveSettings();
      }

      if (!places.length) {
        setStatus(bathStatus, "Fant ingen ferske badeplasser nær dette stedet.", "error");
        return;
      }

      setStatus(bathStatus, `Fant ${places.length} badeplasser nær stedet.`, "ok");
      const selectedName = getSelectedBathName();
      if (selectedName) {
        setStatus(bathStatus, `Fant ${places.length} badeplasser. Bruker ${selectedName}.`, "ok");
      }
    }

    async function applyPlace(result, message = "Sted lagret på knappen.") {
      if (!result || !Number.isFinite(Number(result.lat)) || !Number.isFinite(Number(result.lon))) {
        throw new Error("Fant ikke gyldige koordinater.");
      }

      fields.placeName.value = result.name || fields.placeName.value || defaults.placeName;
      fields.lat.value = Number(result.lat).toFixed(5);
      fields.lon.value = Number(result.lon).toFixed(5);
      fields.bathLocationId.value = "";
      saveSettings();
      setStatus(positionStatus, message, "ok");
      await loadBathPlaces();
    }

    async function findPlaceFromName(reason = "") {
      const current = readForm();
      const query = current.placeName.trim();
      if (query.length < 2) {
        throw new Error("Skriv inn et stedsnavn først.");
      }

      const intro = reason ? `${reason} Prøver stedsnavn...` : "Søker etter stedet...";
      setStatus(positionStatus, intro);
      findPlaceButton.disabled = true;

      try {
        const params = new URLSearchParams({ q: query });
        const payload = await requestJson(`${current.apiBase}/api/geocode.php?${params.toString()}`);
        const result = Array.isArray(payload.results) ? payload.results[0] : null;
        if (!result) {
          throw new Error(`Fant ikke "${query}".`);
        }
        await applyPlace(result, `Bruker ${result.name}.`);
      } finally {
        findPlaceButton.disabled = false;
      }
    }

    function formatDistance(value) {
      const distance = Number(value);
      if (!Number.isFinite(distance)) return "ukjent avstand";
      return distance < 1 ? `${Math.max(1, Math.round(distance * 1000))} m` : `${distance.toFixed(1).replace(".", ",")} km`;
    }

    async function useCurrentPosition() {
      if (!navigator.geolocation) {
        try {
          await findPlaceFromName("Stream Deck-panelet støtter ikke GPS.");
        } catch (error) {
          setStatus(positionStatus, error?.message || "GPS er ikke tilgjengelig.", "error");
        }
        return;
      }

      setStatus(positionStatus, "Henter posisjon...");
      usePositionButton.disabled = true;

      try {
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 60000
          });
        });

        const lat = Number(position.coords.latitude).toFixed(5);
        const lon = Number(position.coords.longitude).toFixed(5);
        fields.lat.value = lat;
        fields.lon.value = lon;

        const current = readForm();
        const params = new URLSearchParams({ lat, lon });
        const payload = await requestJson(`${current.apiBase}/api/geocode.php?${params.toString()}`);
        await applyPlace({
          name: payload.result?.name || "Din posisjon",
          lat,
          lon
        }, "Posisjon lagret på knappen.");
      } catch (error) {
        try {
          const reason = readablePositionError(error);
          await findPlaceFromName(`${reason}`);
        } catch (fallbackError) {
          const message = fallbackError?.message || error?.message || "Kunne ikke hente posisjon.";
          setStatus(positionStatus, message, "error");
        }
      } finally {
        usePositionButton.disabled = false;
      }
    }

    function readablePositionError(error) {
      if (error?.code === 1) return "GPS-tilgang ble nektet.";
      if (error?.code === 2) return "GPS-posisjon var utilgjengelig.";
      if (error?.code === 3) return "GPS brukte for lang tid.";
      return "GPS fungerte ikke.";
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      saveSettings();
    });

    Object.values(fields).forEach((field) => {
      field.addEventListener("change", saveSettings);
    });

    fields.bathLocationId.addEventListener("change", () => {
      const selectedName = getSelectedBathName();
      setStatus(
        bathStatus,
        selectedName ? `Valgt badeplass: ${selectedName}.` : "Bruker nærmeste badeplass automatisk.",
        selectedName ? "ok" : ""
      );
    });

    usePositionButton.addEventListener("click", () => {
      void useCurrentPosition();
    });

    findPlaceButton.addEventListener("click", () => {
      findPlaceFromName().catch((error) => {
        setStatus(positionStatus, error?.message || "Kunne ikke finne sted.", "error");
      });
    });

    loadBathPlacesButton.addEventListener("click", () => {
      loadBathPlaces().catch((error) => {
        setStatus(bathStatus, error?.message || "Kunne ikke hente badeplasser.", "error");
      });
    });

    window.connectElgatoStreamDeckSocket = (port, uuid, registerEvent, info, actionInfo) => {
      context = uuid;
      const parsedActionInfo = JSON.parse(actionInfo || "{}");
      settings = { ...defaults, ...(parsedActionInfo.payload?.settings || {}) };
      render();
      loadBathPlaces(false).catch(() => {});

      websocket = new WebSocket(`ws://127.0.0.1:${port}`);
      websocket.onopen = () => {
        websocket.send(JSON.stringify({ event: registerEvent, uuid }));
      };
      websocket.onmessage = (event) => {
        const message = JSON.parse(event.data || "{}");
        if (message.event === "didReceiveSettings") {
          settings = { ...defaults, ...(message.payload?.settings || {}) };
          render();
          loadBathPlaces(false).catch(() => {});
        }
      };
    };

    render();
  </script>
</body>
</html>
